<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful | HAZON</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        body { background-color: #F5F5F3; color: #111111; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .serif { font-family: 'Playfair Display', serif; }
        .paper-grain {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; opacity: 0.008;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 1.2s ease-out; }
    </style>
</head>
<body class="h-screen flex items-center justify-center overflow-hidden">
    <div class="paper-grain"></div>
    <div class="text-center px-6 animate-fade max-w-md">
        <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-10 shadow-xl shadow-black/5">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h1 class="text-4xl serif mb-4 font-normal tracking-tight">Thank You.</h1>
        <p class="text-sm opacity-50 mb-10 font-light leading-relaxed">Your payment was processed successfully. Verifying your payment and preparing your vision...</p>
        <div class="w-6 h-6 border-2 border-black/5 border-t-black rounded-full animate-spin mx-auto mb-10"></div>
        <a id="redirect-link" href="/" class="text-[10px] uppercase tracking-[0.4em] font-bold opacity-30 hover:opacity-100 transition-opacity">Return to Hazon manually</a>
    </div>

    <script>
        // Extract parameters and redirect back to the app root
        const urlParams = new URLSearchParams(window.location.search);
        const reference = urlParams.get('reference') || urlParams.get('trxref');
        const visionId = urlParams.get('vision_id');
        
        const targetUrl = reference ? `/?reference=${reference}${visionId ? '&vision_id=' + visionId : ''}` : '/';
        document.getElementById('redirect-link').href = targetUrl;

        // Give the user a moment to see the success state
        setTimeout(() => {
            window.location.href = targetUrl;
        }, 2000);
    </script>
</body>
</html>
